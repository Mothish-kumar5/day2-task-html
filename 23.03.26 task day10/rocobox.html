<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
             font-family:Arial, Helvetica, sans-serif;
             padding: 20px;
        }
        .container{
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 300px;
            border: 2px solid black;
            background-color: #f0f0f0;
        }
        .box{
            width: 100px;
            height: 100px;
            background-color: purple;
            color: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 18px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h2> Flexbox Properties Example </h2>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>
</body>
</html>

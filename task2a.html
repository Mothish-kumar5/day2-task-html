<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block vs Inline elements</title>
</head>
<body>
    <!--Bolck Element-->
    <div style="background-color: lightblue; padding:10px;"> 
        <P>I am a block level element </p>
        <P>I am a block level element </p>

    </div>
    <!--Inline Element-->
    <p>
        Welcome to <span style="color:blue;">Chennai</span>, a vibrant city known for culture, beaches, and food. 
        Learn more about its history and attractions by visiting 
     <a href="https://www.tamilnadutourism.tn.gov.in">Tamil Nadu Tourism</a> website today.
    </p>
    <span>This is inline element</span>
    <span>This is inline element</span>
</body>
</body>
</html>

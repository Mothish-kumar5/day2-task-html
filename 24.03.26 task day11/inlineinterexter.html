<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!--External CSS-->
    <link rel="stylesheet" href="styles.css">
    <!--Internal CSS-->
    <style>
        .internal-section{
            background-color: lightblue;
            color: darkblue;
            padding: 20px;
            margin: 10px;
            border: 3px dashed blue;
        }
    </style>
</head>
<body>
   <h1> CSS styling Method Demo</h1>
   <div style="background-color: lightcoral; color: white; padding: 20px; margin: 10px; border: 3px solid red;">
    <h2>Inline CSS</h2>
    <p>This section is styled using CSS.</p>
   </div>
   <div class="internal-section">
    <h2>Internal CSS</h2>
    <p>This section is styled using internal CSS inside in head tag.</p>
   </div> 
   <div class="external-section">
    <h2>External CSS</h2>
    <p>This section is styled using an external css file. using link tag.inside a head tag.</p>
   </div>
</body>
</html>

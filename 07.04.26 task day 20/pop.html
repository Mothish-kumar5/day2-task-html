<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Final Array Elements:</h2>
<pre id="output"></pre>

<script>
let arr = [10, 20, 30];

// push 
arr.push(40);

// pop 
arr.pop();

// unshift 
arr.unshift(5);

// shift 
arr.shift();

let result = "";

// print using for loop
for (let i = 0; i < arr.length; i++) {
    result = result + arr[i] + "\n";
}

document.getElementById("output").textContent = result;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Unordered List with Nested </h2>
    <ul>
        <li>Fruits
            <ul>
                <li>Apple</li>
                <li>Banana</li>
                <li>Mango</li>
            </ul>
        </li>
        <li>Vegetables
            <ul>
                <li>Carrot</li>
                <li>Potato</li>
                <li>Tomato</li>
            </ul>
        </li>
    </ul>

        <h2>Ordered List with Nested </h2>
    <ol>
        <li>Morning Routine
            <ol>
                <li>Wake up</li>
                <li>Brush teeth</li>
                <li>Exercise</li>
            </ol>
        </li>
        <li>Evening Routine
            <ol>
                <li>Dinner</li>
                <li>Study</li>
                <li>Sleep</li>
            </ol>
        </li>
    </ol>
</body>
</html>

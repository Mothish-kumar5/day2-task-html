<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <style>
        body {
            background-color: lightblue;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: darkblue;
            text-align: center;
        }

        p {
            color: black;
            font-size: 18px;
            font-style: italic;
        }

        .box {
            border: 3px solid red;
            background-color: yellow;
            padding: 15px;
            margin: 20px;
        }

        .bold-text {
            font-weight: bold;
        }

        .underline-text {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>CSS Styling Example</h1>

    <div class="box">
        <p class="bold-text">This is bold text inside a box.</p>
        <p class="underline-text">This text is underlined.</p>
        <p>This paragraph is styled with color, font, and italic style.</p>
    </div>

</body>
</html>

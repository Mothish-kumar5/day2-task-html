<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Numbers:</h2>

<script>
for (let i = 1; i <= 10; i++) {
    if (i === 5) {
        continue; // skip 5
    }

    if (i === 8) {
        break; // stop at 8 (8 will NOT be printed)
    }

    document.write(i + "<br>");
}
</script>
</body>
</html>

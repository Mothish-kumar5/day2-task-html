<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Numbers from 1 to 3:</h2>

<script>
    let i = 1;  

    do {
        document.write(i + "<br>");
        i++;
    } while (i <= 3);
</script>
</body>
</html>

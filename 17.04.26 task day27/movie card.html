<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body {
      font-family: Arial;
      padding: 20px;
    }
    h2{
      
        text-align: center;

    }

    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }

    .card {
      width: 180px;
      border: 1px solid #ccc;
      border-radius: 10px;
      overflow: hidden;
      text-align: center;
      box-shadow: 2px 2px 8px rgba(0,0,0,0.2);
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .card h3 {
      margin: 10px 0;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <h2>Movie Cards</h2>

  <div id="movieContainer" class="container"></div>

  <script>
    // Movie data
   let movies = [
  {
    name: "Inception",
    image: "inception.jpg"
  },
  {
    name: "Interstellar",
    image: "intersteller.jpg"
  },
  {
    name: "Avengers",
    image: "avengers.jpg"
  },
  {
    name: "Titanic",
    image: "titanic.jpg"
  }
];


    let container = document.getElementById("movieContainer");

    // Create cards
    for (let i = 0; i < movies.length; i++) {
      let card = document.createElement("div");
      card.className = "card";

      let img = document.createElement("img");
      img.src = movies[i].image;

      let title = document.createElement("h3");
      title.textContent = movies[i].name;

      card.appendChild(img);
      card.appendChild(title);

      container.appendChild(card);
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
<h2>Arrow Functions Example (Check Console)</h2>

<script>
  const square = x => x * x;
  const add = (a, b) => a + b;
  const greet = () => "Hello!";
  const createUser = (name, age) => ({ name, age });

  console.log("Square of 5:", square(5));
  console.log("Addition:", add(3, 4));
  console.log(greet());
  console.log(createUser("John", 30));
</script>

</body>
</html>

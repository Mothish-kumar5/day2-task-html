<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>
    <h2>Class Example (Check Console)</h2>

<script>
  class Person {
    constructor(name, age) {
      this.name = name;
      this.age = age;
    }

    greet() {
      return `Hi, I'm ${this.name} and I'm ${this.age} years old.`;
    }
  }

  const person1 = new Person("Alice", 25);
  console.log(person1.greet());
</script>
</body>
</html>
